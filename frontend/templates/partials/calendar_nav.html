<div class="calendar-nav">
  <button class="btn btn-outline btn-icon" type="button" onclick="{% if nav_namespace %}{{ nav_namespace }}.prevPeriod(){% else %}prevPeriod(){% endif %}" aria-label="{{ prev_aria_label|default:'Previous period' }}">
    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
      <path d="m15 18-6-6 6-6"/>
    </svg>
  </button>
  <button class="btn btn-outline btn-sm" type="button" onclick="{% if nav_namespace %}{{ nav_namespace }}.goToToday(){% else %}goToToday(){% endif %}">Today</button>
  <button class="btn btn-outline btn-icon" type="button" onclick="{% if nav_namespace %}{{ nav_namespace }}.nextPeriod(){% else %}nextPeriod(){% endif %}" aria-label="{{ next_aria_label|default:'Next period' }}">
    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
      <path d="m9 18 6-6-6-6"/>
    </svg>
  </button>
</div>
